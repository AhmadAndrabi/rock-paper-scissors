<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ahmad Andrabi" />
    <link rel="stylesheet" href="stone-paper-scissors.css" />
    <title>Rock Paper Scissors</title>
  </head>

  <body>
    <div class="papa">
      <p class="game-title">Rock Paper Scissors</p>

      <div>
        <button class="move-button js-move-button1">
          <img
            src="icons/stone-emoji.png"
            alt="Stone emoji"
            class="emoji-icon"
          />
        </button>

        <button class="move-button js-move-button2">
          <img
            src="icons/paper-emoji.png"
            alt="Paper emoji"
            class="emoji-icon"
          />
        </button>

        <button class="move-button js-move-button3">
          <img
            src="icons/scissors-emoji.png"
            alt="Paper emoji"
            class="emoji-icon"
          />
        </button>
      </div>

      <p class="js-result"></p>

      <p class="js-moves-para"></p>

      <p class="js-score-para"></p>

      <button class="button-reset js-button-reset">Reset Score</button>

      <button class="button-auto js-button-auto">Auto Play</button>
    </div>

    <script src="stone-paper-scissors.js"></script>
  </body>
</html>
